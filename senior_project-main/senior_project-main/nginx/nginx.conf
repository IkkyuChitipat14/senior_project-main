worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Backend API routes
        location /api/ {
            proxy_pass http://backend:8020;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ThaID callback endpoint - ต้อง forward ไปยัง backend
        location = /callback {
            access_log /var/log/nginx/callback.log;
            error_log /var/log/nginx/callback_error.log debug;
            
            proxy_pass http://backend:8020;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Debug endpoint
        location = /debug {
            proxy_pass http://backend:8020;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ThaID callback at root - forward to backend when code parameter exists
        location = / {
            access_log /var/log/nginx/thaID_root_callback.log;
            
            # Check if it's a ThaID callback (has code and state)
            if ($args ~* "code=") {
                return 307 /callback$is_args$args;
            }
            
            # Otherwise serve frontend
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Campus routes - ต้องมาก่อน location / เพื่อให้ match ก่อน
        location /campus/ {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Hospital routes - ต้องมาก่อน location / เพื่อให้ match ก่อน
        location /hospital/ {
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Frontend routes (fallback)
        location / {
            try_files $uri $uri.html $uri/ /index.html;
        }
    }
}
